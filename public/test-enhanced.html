<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>⚡ Energy Monitor</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/test.js"></script>
    <script src="js/test-enhanced.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/app-enhanced.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>⚡ Energy Monitor</h1>
                <p class="subtitle">Analyze your energy consumption patterns</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
                <span id="theme-text">Dark Mode</span>
            </button>
        </header>

        <div class="control-panel">
            <div class="control-row">
                <div class="control-group">
                    <label for="charts">Chart Type</label>
                    <select name="charts" id="charts">
                        <option value="daily">Daily Average</option>
                        <option value="hourly">Hourly Pattern</option>
                        <option value="monthly">Monthly Trend</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Display Mode</label>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="average" name="average" value="Average" checked>
                        <label for="average">Show Averages</label>
                    </div>
                </div>

                <div class="control-group" style="margin-left: auto;">
                    <label>&nbsp;</label>
                    <button type="button" onclick="onButtonClick()">
                        📊 Generate Chart
                    </button>
                </div>
            </div>

            <div class="divider"></div>

            <div class="control-row">
                <div class="control-group">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" value="2019-01-01" min="2019-01-01" max="2021-12-31"/>
                </div>

                <div class="control-group">
                    <label for="endDate">End Date</label>
                    <input type="date" id="endDate" value="2021-11-09" min="2019-01-01" max="2021-12-31"/>
                </div>
            </div>

            <div class="divider"></div>

            <div class="control-row">
                <div class="control-group">
                    <label>Filter by Days</label>
                    <div id="list1" class="dropdown-check-list" tabindex="100">
                        <span class="anchor">Select Days</span>
                        <ul class="items">
                            <li><input type="checkbox" checked="true" id="chkSunday"/>Sunday</li>
                            <li><input type="checkbox" checked="true" id="chkMonday"/>Monday</li>
                            <li><input type="checkbox" checked="true" id="chkTuesday"/>Tuesday</li>
                            <li><input type="checkbox" checked="true" id="chkWednesday"/>Wednesday</li>
                            <li><input type="checkbox" checked="true" id="chkThursday"/>Thursday</li>
                            <li><input type="checkbox" checked="true" id="chkFriday"/>Friday</li>
                            <li><input type="checkbox" checked="true" id="chkSaturday"/>Saturday</li>
                        </ul>
                    </div>
                </div>

                <div class="control-group">
                    <label>Filter by Years</label>
                    <div id="list2" class="dropdown-check-list" tabindex="101">
                        <span class="anchor">Select Years</span>
                        <ul class="items">
                            <li><input type="checkbox" checked="true" id="chk2019"/>2019</li>
                            <li><input type="checkbox" checked="true" id="chk2020"/>2020</li>
                            <li><input type="checkbox" checked="true" id="chk2021"/>2021</li>
                            <li><input type="checkbox" checked="true" id="chk2022"/>2022</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            Loading data
        </div>

        <div class="chart-container">
            <div class="chart-wrapper">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle functionality
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            if (newTheme === 'dark') {
                icon.textContent = '☀️';
                text.textContent = 'Light Mode';
            } else {
                icon.textContent = '🌙';
                text.textContent = 'Dark Mode';
            }
        }

        // Load saved theme on page load
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            html.setAttribute('data-theme', savedTheme);
            
            if (savedTheme === 'dark') {
                icon.textContent = '☀️';
                text.textContent = 'Light Mode';
            }
        })();
    </script>
</body>
</html>
